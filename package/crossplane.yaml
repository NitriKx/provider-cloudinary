apiVersion: meta.pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-cloudinary
  annotations:
    meta.crossplane.io/maintainer: NitriKx <benoit.sauvere@backmarket.com>
    meta.crossplane.io/source: github.com/NitriKx/provider-cloudinary
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Crossplane provider for Cloudinary Admin API. Manages folders and webhook
      triggers inside a Cloudinary product environment.
    meta.crossplane.io/readme: |
      # provider-cloudinary

      Manages Cloudinary folders and webhook triggers via the Cloudinary Admin API.
      See the [README](https://github.com/NitriKx/provider-cloudinary) for setup
      instructions and examples.
    meta.crossplane.io/iconData: 
spec:
  crossplane:
    version: ">=v1.14.0-0"
  controller:
    image: ghcr.io/nitrikx/provider-cloudinary:latest
  capabilities:
    - SafeStart
